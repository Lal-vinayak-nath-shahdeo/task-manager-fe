name: Deploy to Pi

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: self-hosted
    environment: production

    env:
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
      APP_PORT: ${{ secrets.APP_PORT }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Sync repo to deploy path
        run: |
          sudo mkdir -p "$DEPLOY_PATH"
          sudo chown -R "$USER":"$USER" "$DEPLOY_PATH"
          rsync -a --delete "${GITHUB_WORKSPACE}/" "$DEPLOY_PATH/"

      - name: Create .env file on Pi
        run: |
          cat > "$DEPLOY_PATH/.env" <<EOF
          NODE_ENV=${{ secrets.NODE_ENV }}
          APP_PORT=${{ secrets.APP_PORT }}
          VITE_API_URL=${{ secrets.VITE_API_URL }}
          EOF
          chmod 600 "$DEPLOY_PATH/.env"
          echo "✅ .env created and secured"

      - name: Build and run with Docker Compose
        run: |
          cd "$DEPLOY_PATH"
          docker compose down || true
          docker compose build --no-cache
          docker compose up -d

      - name: Clean up old Docker images
        run: |
          docker image prune -f
          docker builder prune -f

      - name: Verify deployment
        run: |
          sleep 5
          docker compose ps
          curl -f http://localhost:${{ secrets.APP_PORT }} || (echo "❌ Deployment verification failed" && exit 1)
          echo "✅ Deployment verified on port ${{ secrets.APP_PORT }}"
