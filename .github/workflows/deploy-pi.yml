name: Deploy to Pi

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: self-hosted
    environment: pi # 👈 changed from "production" to "pi"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Debug secrets
        run: |
          echo "DEPLOY_PATH is set: ${{ secrets.DEPLOY_PATH != '' }}"
          echo "APP_PORT is set: ${{ secrets.APP_PORT != '' }}"

      - name: Sync repo to deploy path
        run: |
          sudo mkdir -p "${{ secrets.DEPLOY_PATH }}"
          sudo chown -R "$USER":"$USER" "${{ secrets.DEPLOY_PATH }}"
          rsync -a --delete "${GITHUB_WORKSPACE}/" "${{ secrets.DEPLOY_PATH }}/"

      - name: Create .env file on Pi
        run: |
          cat > "${{ secrets.DEPLOY_PATH }}/.env" <<EOF
          NODE_ENV=${{ secrets.NODE_ENV }}
          APP_PORT=${{ secrets.APP_PORT }}
          VITE_API_URL=${{ secrets.VITE_API_URL }}
          EOF
          chmod 600 "${{ secrets.DEPLOY_PATH }}/.env"
          echo "✅ .env created and secured"

      - name: Build and run with Docker Compose
        run: |
          cd "${{ secrets.DEPLOY_PATH }}"
          docker compose down || true
          docker compose build --no-cache
          docker compose up -d

      - name: Clean up old Docker images
        run: |
          docker image prune -f
          docker builder prune -f

      - name: Verify deployment
        run: |
          sleep 5
          cd "${{ secrets.DEPLOY_PATH }}"
          docker compose ps
          curl -f http://localhost:${{ secrets.APP_PORT }} || (echo "❌ Deployment verification failed" && exit 1)
          echo "✅ Deployment verified on port ${{ secrets.APP_PORT }}"
